name: flutter_ecommerce
description: Enterprise E-commerce Flutter App with Riverpod State Management
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.10.0
  pretty_dio_logger: ^1.4.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # DI
  get_it: ^7.7.0
  injectable: ^2.6.0

  # Utils
  equatable: ^2.1.0
  dartz: ^0.10.1
  uuid: ^4.5.1
  logger: ^2.5.0
  connectivity_plus: ^6.1.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  package_info_plus: ^8.3.1
  device_info_plus: ^11.5.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  google_fonts: ^6.3.3

  # Forms & Validation
  formz: ^0.7.0

  # Image & Media
  image_picker: ^1.2.3
  photo_view: ^0.15.0
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700